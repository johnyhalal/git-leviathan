name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which distributable to build"
        required: true
        type: choice
        default: all
        options:
          - all
          - macos
          - windows
          - linux-x64
          - linux-arm64
      tag:
        description: "Release tag (blank = v<version> from package.json)"
        required: false
        default: ""

permissions:
  contents: write # allow creating the Release + uploading assets via GITHUB_TOKEN

jobs:
  build-macos:
    if: ${{ inputs.target == 'all' || inputs.target == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # LTS; Forge 7 / Electron 43 are fine on 20/22
          cache: npm

      - run: npm ci

      # `.env` is gitignored, so it isn't on the runner. Vite bakes these OAuth
      # client IDs into the main bundle at build time (see vite.main.config.ts),
      # so without this the shipped app has empty client IDs. The IDs are public
      # (no client secret involved), hence repo Variables rather than Secrets.
      # NB: repo variable is GH_CLIENT_ID, not GITHUB_CLIENT_ID — Actions forbids
      # secret/variable names starting with the GITHUB_ prefix.
      - name: Write OAuth client IDs for the build
        run: |
          {
            echo "GITHUB_CLIENT_ID=${{ vars.GH_CLIENT_ID }}"
            echo "GITLAB_CLIENT_ID=${{ vars.GITLAB_CLIENT_ID }}"
            echo "APPLE_ID=${{ vars.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ vars.APPLE_TEAM_ID }}"
          } > .env

      # A fresh runner has no certificates, so osx-sign has no Developer ID
      # identity and would leave the app ad-hoc (the notarize pre-check then fails
      # with "code has no resources but signature indicates they must be present").
      # Import the exported Developer ID Application .p12 into a throwaway keychain
      # so codesign can find it. The APPLE_* vars written above only cover
      # notarization — signing needs the actual cert + private key present here.
      - name: Import Developer ID signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          # temporary keychain, unlocked for the length of the build
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # import the cert + private key
          security import "$CERT_PATH" -P "$APPLE_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # let codesign use the key without an interactive prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # put the keychain on the search list so `security find-identity` sees it
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # fail loudly here if the identity didn't land, rather than mid-make
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Universal build: one DMG carrying both arm64 and x64 slices, so it runs
      # natively on Apple Silicon and Intel Macs. The arm64 runner builds this
      # fine — Forge pulls the x64 Electron and merges via @electron/universal,
      # then signs/notarizes the merged app.
      - name: Build macOS distributable
        run: npm run make:universal

      - name: Resolve release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage asset with a stable name
        run: |
          DMG=$(find out/make -name '*.dmg' | head -n1)
          [ -z "$DMG" ] && { echo "No macOS .dmg produced under out/make"; exit 1; }
          cp "$DMG" "GitLeviathan-macOS.dmg"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: GitLeviathan ${{ steps.meta.outputs.version }}
          files: GitLeviathan-macOS.dmg
          fail_on_unmatched_files: true

  build-windows:
    if: ${{ inputs.target == 'all' || inputs.target == 'windows' }}
    runs-on: windows-latest
    # Every `run:` here is bash (find/cp/[ -z ]); the Windows runner has Git Bash,
    # so pin it rather than falling back to PowerShell.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Same reason as the macOS job: Vite bakes the OAuth client IDs into the
      # main bundle at build time, so they must be on `.env` before `make`. No
      # Apple vars here — signing/notarization is macOS-only.
      - name: Write OAuth client IDs for the build
        run: |
          {
            echo "GITHUB_CLIENT_ID=${{ vars.GH_CLIENT_ID }}"
            echo "GITLAB_CLIENT_ID=${{ vars.GITLAB_CLIENT_ID }}"
          } > .env

      # Produces the Squirrel installer (MakerSquirrel) under
      # out/make/squirrel.windows/. The DMG/deb/rpm makers are macOS/Linux-only
      # and are skipped on this runner. The installer is unsigned — Windows
      # SmartScreen may warn until a code-signing cert is added.
      - name: Build Windows distributable
        run: npm run make

      - name: Resolve release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage asset with a stable name
        run: |
          EXE=$(find out/make -name '*.exe' | head -n1)
          [ -z "$EXE" ] && { echo "No Windows Setup .exe produced under out/make"; exit 1; }
          cp "$EXE" "GitLeviathan-Windows-Setup.exe"

      # Uploads onto the same tag/release the macOS job creates; action-gh-release
      # upserts the release and appends this asset.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: GitLeviathan ${{ steps.meta.outputs.version }}
          files: GitLeviathan-Windows-Setup.exe
          fail_on_unmatched_files: true

  # Turn the single `target` choice into the list of Linux arches to build, so a
  # `linux-x64` selection doesn't also spin up an arm64 build. `all` builds both.
  # Skipped entirely when the selection has no Linux in it, which then skips
  # build-linux via `needs`.
  setup-linux:
    if: ${{ inputs.target == 'all' || inputs.target == 'linux-x64' || inputs.target == 'linux-arm64' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          case "${{ inputs.target }}" in
            linux-x64)   echo 'matrix={"arch":["x64"]}' >> "$GITHUB_OUTPUT" ;;
            linux-arm64) echo 'matrix={"arch":["arm64"]}' >> "$GITHUB_OUTPUT" ;;
            *)           echo 'matrix={"arch":["x64","arm64"]}' >> "$GITHUB_OUTPUT" ;;
          esac

  build-linux:
    needs: setup-linux
    runs-on: ubuntu-latest
    # Build each arch on the amd64 runner. The app is pure JS (no native modules
    # to rebuild) and dpkg/rpmbuild just stamp arch metadata, so arm64 packages
    # cross-build fine here — no arm64 runner needed.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-linux.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # MakerDeb needs `dpkg` + `fakeroot`; MakerRpm needs `rpm` (rpmbuild).
      # Ubuntu runners ship dpkg but not fakeroot/rpm, so install them or the
      # deb/rpm makers fail mid-build.
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - run: npm ci

      # Same as the other jobs: Vite bakes the OAuth client IDs into the main
      # bundle at build time, so they must be on `.env` before `make`.
      - name: Write OAuth client IDs for the build
        run: |
          {
            echo "GITHUB_CLIENT_ID=${{ vars.GH_CLIENT_ID }}"
            echo "GITLAB_CLIENT_ID=${{ vars.GITLAB_CLIENT_ID }}"
          } > .env

      # Produces the .deb (MakerDeb) and .rpm (MakerRpm) for this arch under
      # out/make/. The DMG/Squirrel makers are macOS/Windows-only and skipped.
      - name: Build Linux distributables
        run: npm run make -- --arch=${{ matrix.arch }}

      - name: Resolve release tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Only this arch's packages exist under out/make, so the first match is it.
      - name: Stage assets with stable names
        run: |
          DEB=$(find out/make -name '*.deb' | head -n1)
          RPM=$(find out/make -name '*.rpm' | head -n1)
          [ -z "$DEB" ] && { echo "No .deb produced under out/make"; exit 1; }
          [ -z "$RPM" ] && { echo "No .rpm produced under out/make"; exit 1; }
          cp "$DEB" "GitLeviathan-Linux-${{ matrix.arch }}.deb"
          cp "$RPM" "GitLeviathan-Linux-${{ matrix.arch }}.rpm"

      # Uploads onto the same tag/release the other jobs use; action-gh-release
      # upserts the release and appends these assets.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: GitLeviathan ${{ steps.meta.outputs.version }}
          files: |
            GitLeviathan-Linux-${{ matrix.arch }}.deb
            GitLeviathan-Linux-${{ matrix.arch }}.rpm
          fail_on_unmatched_files: true
